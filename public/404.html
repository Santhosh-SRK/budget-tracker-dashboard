<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Budget Tracker</title>
    <script type="text/javascript">
      // GitHub Pages SPA workaround
      // Redirect all 404s to the index.html with the path preserved
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/budget-tracker-dashboard/' + l.pathname.slice(1).split('/').slice(1).join('/') +
        (l.search ? '?' + l.search.slice(1) : '') +
        (l.hash ? '#' + l.hash.slice(1) : '')
      );
    </script>
  </head>
  <body>
  </body>
</html>
